# dnsmasq configuration for pi-server
# DNS only — DHCP is handled by the classroom router
# Place this file at /etc/dnsmasq.conf on the Pi

# Listen on ethernet (Pi connected to router via eth0)
interface=eth0

# Custom domain: solar.server → this Pi's static IP
# Replace 192.168.1.XXX with the Pi's actual static IP
address=/solar.server/192.168.1.XXX

# Upstream DNS (forward all other lookups to Cloudflare/Google)
server=1.1.1.1
server=8.8.8.8
